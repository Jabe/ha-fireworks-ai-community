name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 4 * * *"

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Brand assets / brands-repo listing are intentionally deferred until
          # this integration goes official, so skip the brands check for now.
          ignore: brands
